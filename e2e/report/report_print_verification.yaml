appId: com.cardselling.agent

tags:
  - smoke
  - regression
  - p2
  - functional

---
# Launch app with fresh state
- launchApp:
    clearState: true

# Login Flow
- runFlow:
    file: ../../flows/login_helper.yaml
    env:
      MOBILE_NUMBER: ${MOBILE_NUMBER_1}
      PASSWORD: ${PASSWORD_1}

# Navigate to Report
- assertVisible: "Report"
- tapOn: "Report"

# Handle print permission if shown
- runFlow:
    when:
      visible: "Allow CS Agent to find, connect to and determine the relative position of nearby devices?"
    commands:
      - runFlow:
          file: ../../flows/print_permission.yaml

- assertVisible: Print transaction
- tapOn: Print transaction
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: All
    index: 1
- assertVisible: Bundle Purchase
- tapOn: Bundle Purchase
- tapOn: Proceed
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: Today
    index: 1
- tapOn: This Month
- tapOn: Proceed
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot:
    path: "../../screenshots/bundle_purchase_before_print_count"
- tapOn: Print transaction

- runFlow:
    file: ../../flows/teadown.yaml
