appId: com.cardselling.agent
tags:
  - smoke
  - regression
  - p0
  - functional

---
# Launch app with fresh state
- launchApp:
    clearState: true

# Login Flow
- runFlow:
    file: ../../flows/login_helper.yaml
    env:
      MOBILE_NUMBER: ${MOBILE_NUMBER_1}
      PASSWORD: ${PASSWORD_1}

# Navigate to Report
- assertVisible: "Report"
- tapOn: "Report"

# Handle print permission if shown
- runFlow:
    when:
      visible: "Allow CS Agent to find, connect to and determine the relative position of nearby devices?"
    commands:
      - runFlow:
          file: ../../flows/print_permission.yaml

# Report Screen Assertions
- assertVisible: "Reports"
- assertVisible: "Total Transactions"
- assertVisible: "Number of Transactions"

# Optional empty state (ignore if not present)
- assertVisible:
    text: "No transactions yet"
    optional: true

# Action buttons
- assertVisible: "Export transaction"
- assertVisible: "Print transaction"

# Filters (using index to handle duplicate texts)
- assertVisible:
    text: "Today"
    index: 1

- assertVisible:
    text: "All"
    index: 1

# Teardown / Cleanup
- runFlow:
    file: ../../flows/teardown.yaml
